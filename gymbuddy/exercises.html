<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="A new web page">
    <meta name="robots" content="index, follow">
    <link rel="icon" href="../assets/img/Gymscribe.png">
    <title>GymBuddy - Exercises</title>
    
    <link rel="stylesheet" href="./style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    
    <script src="./burger.js" defer></script>
    <script src="./gymbuddyExercises.js" type="module"></script>
    <script src="../assets/js/handler.js" type="module"></script>
</head>
<body>
  <div class="navbar">
    <div class="logo-container">
      <a href="/" class="logo">
        <img src="../assets/img/Gymscribe.png" alt="Gymscribe Logo">
      </a>
      <span>GymBuddy</span>
    </div>
    
    <nav class="menu">
      <a href="/gymbuddy/index.html">Ask GymBuddy</a>
      <a href="/gymbuddy/exercises.html">Exercises</a>
      <a href="/gymbuddy/journals.html">Journals</a>
      <a href="../">Try Gymscribe</a>
    </nav>
  </div>
  
  <div class="burger-container">
    <div class="burger">☰</div>
  </div>
  
  <main>
    <div class="exercises-manager">
      <form id="exercisesForm">
        <h1>Search Exercises</h1>
        <label for="exercisesType">Search For:</label>
        <select id="exercisesType" name="exercisesType" required>
          <option value="name">Exercises By Name</option>
          <option value="bodyPart">Exercises By Body Part</option>
          <option value="muscle">Exercises By Muscle</option>
          <option value="equipment">Exercises By Equipment</option>
        </select>
        <label for="exercisesSearch">Search:</label>
        <input id="exercisesSearch" type="text" placeholder="Search exercises..." maxlength="24" autocomplete="off" required>
        <button id="exercisesSubmit" type="submit">Search Exercises</button>
      </form>
    </div>
    <div id="exercises-list" class="exercises-list">
      <div class="exerciseFound">
        <p>Status: Success</p>
        <p>Found: 100</p>
        <p>Listed: 10</p>
      </div>
      <div class="exercise">
        <h3>12345ab - Exercise 1</h3>
      </div>
    </div>
  </main>
</body>
</html>
